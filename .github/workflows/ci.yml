name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
            cd app
            npm install

      - name: Start server
        run: |
            cd app
            node app.js &

      - name: Wait
        run: sleep 3

      - name: Run tests
        run: |
            cd app
            npm test || echo "No tests"

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
            cd app
            docker build -t task-app .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: task-app
          severity: CRITICAL
          exit-code: 1
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image
        run: |
          docker tag task-app ${{ secrets.DOCKER_USERNAME }}/task-app:v2

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/task-app:v2